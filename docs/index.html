<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID 衰减函数对比</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+"
    crossorigin="anonymous"
  />
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
    integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/0T2VMjhKTFUR"
    crossorigin="anonymous"
  ></script>
  <script
    defer
    src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rF4y8Q+kg7nmUWN6N5g"
    crossorigin="anonymous"
  ></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

  <style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #6e7781;
    --border: #d0d7de;
    --accent: #0969da;
    --panel-bg: #f6f8fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .app-header h1 { margin: 0; font-size: 20px; }
  .app-header a {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
  }
  .app-header a:hover { text-decoration: underline; }

  .function-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 20px;
    align-items: center;
    padding: 16px 24px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
  }
  .function-picker label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 14px;
    user-select: none;
  }
  .function-picker .swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .function-picker button {
    margin-left: auto;
    padding: 4px 12px;
    font-size: 13px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  .function-picker button:hover { background: #f3f4f6; }

  .chart-container {
    padding: 24px;
    height: 480px;
  }

  .params-panel {
    padding: 0 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 16px;
  }
  .param-block {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    background: var(--panel-bg);
  }
  .param-block .title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .param-block .formula { margin: 8px 0 12px; font-size: 14px; }
  .param-row {
    display: grid;
    grid-template-columns: 24px 1fr 56px;
    align-items: center;
    gap: 8px;
    margin: 6px 0;
    font-size: 13px;
  }
  .param-row input[type="range"] { width: 100%; }
  .param-row .value { text-align: right; font-variant-numeric: tabular-nums; }

  @media (max-width: 900px) {
    .chart-container { height: 320px; padding: 16px; }
    .params-panel { padding: 0 16px 24px; grid-template-columns: 1fr; }
    .function-picker { padding: 12px 16px; }
    .app-header { padding: 12px 16px; }
  }
</style>
</head>
<body>
  <header class="app-header">
    <h1>PID 衰减函数对比</h1>
    <a href="https://github.com/MisakaMikoto128/PID" target="_blank" rel="noopener">GitHub</a>
  </header>

  <section class="function-picker" id="functionPicker"></section>

  <section class="chart-container">
    <canvas id="chart"></canvas>
  </section>

  <section class="params-panel" id="paramsPanel"></section>

  <script id="data">
    /* 占位，Task 3 填充 */
  </script>
  <script id="ui">
    /* 占位，Task 4-7 填充 */
  </script>
</body>
</html>
